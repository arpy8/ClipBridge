<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipBridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a32;
    --accent: #00e5a0;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --danger: #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .logo {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .logo span { color: var(--accent); }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .lbl {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    white-space: nowrap;
  }

  input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.on {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }

  textarea {
    width: 100%;
    min-height: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    line-height: 1.7;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--border); }
  textarea::placeholder { color: var(--muted); }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hint { font-size: 0.7rem; color: var(--muted); }

  .status {
    font-size: 0.72rem;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    transition: color 0.2s, border-color 0.2s;
  }
  .status.ok { color: var(--accent); border-color: #1e2e25; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (max-width: 500px) {
    .row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">Clip<span>Bridge</span></div>

  <div class="row">
    <span class="lbl">Room</span>
    <input type="text" id="room" placeholder="my-room" autocomplete="off" spellcheck="false" />
    <span class="lbl">Pass</span>
    <input type="password" id="pass" placeholder="••••" autocomplete="off" />
    <div class="dot" id="dot"></div>
  </div>

  <textarea id="area" placeholder="Paste here on one laptop → instantly appears on the other.

Same Room + Password on both devices.
Works across any two computers on the internet."></textarea>

  <div class="footer">
    <span class="hint">auto-sends on paste · 600ms debounce on type</span>
    <span class="status" id="status">not connected</span>
  </div>
</div>

<script src="https://unpkg.com/mqtt@5.8.1/dist/mqtt.min.js"></script>
<script>
  let client = null, hash = null, lastTs = null, typeTimer = null;

  async function hashPass(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2,'0')).join('').slice(0, 12);
  }

  function topic() {
    return `cb2/${document.getElementById('room').value.trim()}/${hash}`;
  }

  function setStatus(msg, ok) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (ok ? ' ok' : '');
  }

  function setDot(on) {
    document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
  }

  async function connect() {
    const room = document.getElementById('room').value.trim();
    const pass = document.getElementById('pass').value;
    if (!room || !pass) return;
    if (client) { client.end(); client = null; }

    hash = await hashPass(pass);
    setStatus('connecting…');

    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

    client.on('connect', () => {
      client.subscribe(topic());
      setDot(true);
      setStatus('connected', true);
    });

    client.on('error', () => setStatus('error'));
    client.on('close', () => { setDot(false); setStatus('disconnected'); });

    client.on('message', (t, msg) => {
      try {
        const p = JSON.parse(msg.toString());
        if (p.ts === lastTs) return;
        lastTs = p.ts;
        document.getElementById('area').value = p.content;
        navigator.clipboard.writeText(p.content).catch(() => {});
        setStatus('received!', true);
        setTimeout(() => setStatus('connected', true), 2000);
      } catch(e) {}
    });
  }

  function publish(content) {
    if (!client || !client.connected) return;
    const ts = Date.now();
    lastTs = ts;
    client.publish(topic(), JSON.stringify({ content, ts }));
    setStatus('synced!', true);
    setTimeout(() => setStatus('connected', true), 1500);
  }

  // Connect when room/pass are filled in
  document.getElementById('room').addEventListener('change', connect);
  document.getElementById('pass').addEventListener('change', connect);

  // Also try on Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });

  const area = document.getElementById('area');

  // Debounced auto-send on type
  area.addEventListener('input', () => {
    clearTimeout(typeTimer);
    typeTimer = setTimeout(() => {
      if (area.value.trim()) publish(area.value);
    }, 600);
  });

  // Instant send on paste
  document.addEventListener('paste', e => {
    if (!client?.connected) return;
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (!text) return;
    setTimeout(() => publish(area.value || text), 60);
  });
</script>
</body>
</html>
